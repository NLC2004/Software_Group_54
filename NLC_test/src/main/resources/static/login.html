<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUPT TA Recruitment</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#4361EE"/>
                    <path d="M24 12L34 18V20H14V18L24 12Z" fill="white"/>
                    <rect x="17" y="22" width="4" height="10" rx="1" fill="white" opacity="0.85"/>
                    <rect x="23" y="22" width="4" height="10" rx="1" fill="white" opacity="0.85"/>
                    <rect x="29" y="22" width="4" height="10" rx="1" fill="white" opacity="0.85"/>
                    <rect x="14" y="33" width="22" height="3" rx="1" fill="white"/>
                </svg>
            </div>
            <h1>BUPT TA Recruitment</h1>
            <p>Teaching Assistant Recruitment System</p>
        </div>

        <div class="login-tabs">
            <button class="login-tab active" data-tab="login">Sign In</button>
            <button class="login-tab" data-tab="register">Register</button>
        </div>

        <div id="loginError" class="alert alert-error" style="display:none"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="l_user">Username</label>
                <input type="text" id="l_user" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="l_pass">Password</label>
                <input type="password" id="l_pass" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <form id="registerForm" style="display:none">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your.email@bupt.edu.cn">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required minlength="4">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-select">
                    <option value="TA">Teaching Assistant (TA)</option>
                    <option value="MO">Module Organiser (MO)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
    </div>

<script>
if (localStorage.getItem('token')) { window.location.href = '/dashboard.html'; }

const tabs = document.querySelectorAll('.login-tab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const errorEl = document.getElementById('loginError');

function showErr(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 4000);
}

tabs.forEach(tab => tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    loginForm.style.display = tab.dataset.tab === 'login' ? 'block' : 'none';
    registerForm.style.display = tab.dataset.tab === 'register' ? 'block' : 'none';
    errorEl.style.display = 'none';
}));

loginForm.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(loginForm);
    try {
        const r = await fetch('/api/auth/login', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({username: fd.get('username'), password: fd.get('password')})
        });
        const d = await r.json();
        if (!r.ok) { showErr(d.error); return; }
        localStorage.setItem('token', d.token);
        localStorage.setItem('user', JSON.stringify(d.user));
        window.location.href = '/dashboard.html';
    } catch(e) { showErr('Connection failed. Is the server running?'); }
});

registerForm.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(registerForm);
    try {
        const r = await fetch('/api/auth/register', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                username: fd.get('username'), password: fd.get('password'),
                fullName: fd.get('fullName'), email: fd.get('email'), role: fd.get('role')
            })
        });
        const d = await r.json();
        if (!r.ok) { showErr(d.error); return; }
        localStorage.setItem('token', d.token);
        localStorage.setItem('user', JSON.stringify(d.user));
        window.location.href = '/dashboard.html';
    } catch(e) { showErr('Connection failed. Is the server running?'); }
});
</script>
</body>
</html>
