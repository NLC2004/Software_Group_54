<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Job - TA Recruitment MO System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FC; }
        .nav-link { display: flex; align-items: center; padding: 0.75rem; border-radius: 0.75rem; transition: all 0.3s ease; }
        .nav-link.active { background-color: rgb(239 246 255); color: rgb(37 99 235); font-weight: 600; }
        .nav-link.inactive { color: rgb(100 116 139); }
        .nav-link.inactive:hover { background-color: rgb(248 250 252); color: rgb(37 99 235); }
        .form-input { display: block; width: 100%; background-color: white; border: 1px solid rgb(229 231 235); border-radius: 1rem; padding: 0.75rem 1rem; transition: all 0.3s ease; outline: none; }
        .form-input:focus { border-color: rgb(59 130 246); box-shadow: 0 0 0 3px rgba(59 130 246, 0.1); }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex min-h-screen">
<!-- Sidebar -->
<aside class="w-64 bg-white border-r border-gray-100 flex flex-col fixed h-full z-50">
<div class="p-6 flex items-center space-x-3">
<div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
<span class="iconify text-2xl" data-icon="solar:library-bold"></span>
</div>
<span class="text-xl font-bold text-gray-800 tracking-tight">EduMO</span>
</div>
<nav class="flex-1 mt-4 px-4 space-y-2">
<a class="nav-link inactive" href="my-job-list.html">
<span class="iconify mr-3 text-xl" data-icon="solar:widget-4-bold"></span>
<span>Dashboard</span>
</a>
<a class="nav-link inactive" href="statistics-analysis.html">
<span class="iconify mr-3 text-xl" data-icon="solar:chart-2-bold"></span>
<span>Statistics</span>
</a>
<a class="nav-link inactive" href="notifications-messages.html">
<span class="iconify mr-3 text-xl" data-icon="solar:bell-bing-bold"></span>
<span>Notifications</span>
</a>
<a class="nav-link inactive" href="personal-center.html">
<span class="iconify mr-3 text-xl" data-icon="solar:user-circle-bold"></span>
<span>Profile Settings</span>
</a>
</nav>
</aside>
<!-- Main Content -->
<main class="ml-64 flex-1 flex flex-col">
<header class="h-16 bg-white/80 glass-effect border-b border-gray-100 flex items-center px-8">
<div class="flex items-center space-x-2 text-sm text-gray-500">
<a class="hover:text-blue-600" href="my-job-list.html">Jobs</a>
<span class="iconify" data-icon="solar:alt-arrow-right-linear"></span>
<span class="text-gray-900 font-medium italic underline">Edit: CS101 Intro to Python</span>
</div>
</header>
<div class="p-8 max-w-4xl mx-auto w-full">
<div class="mb-10 flex items-center justify-between">
<div>
<h1 class="text-3xl font-black text-gray-800 mb-2">Modify Position</h1>
<p class="text-gray-400">Updating active recruitment details for the Fall 2026 semester.</p>
</div>
<div class="px-5 py-2 bg-green-50 text-green-600 text-xs font-bold rounded-full border border-green-100">STATUS: ACTIVE</div>
</div>
<form class="space-y-8 pb-20">
<!-- Section 1: Basic Info -->
<section class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
<div class="flex items-center mb-6 space-x-3">
<div class="p-2 bg-blue-50 text-blue-600 rounded-lg"><span class="iconify text-xl" data-icon="solar:info-square-bold"></span></div>
<h3 class="text-lg font-bold text-gray-800">Job Specification</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Course Name</label>
<input class="form-input" type="text" value="Intro to Python Computing"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Course Code</label>
<input class="form-input" type="text" value="CS101"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Work Location</label>
<input class="form-input" type="text" value="Science Building, Lab 4"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Current Deadline</label>
<input class="form-input" type="date" value="2026-03-30"/>
</div>
</div>
</section>
<!-- Section 3: Remuneration -->
<section class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
<div class="flex items-center mb-6 space-x-3">
<div class="p-2 bg-green-50 text-green-600 rounded-lg"><span class="iconify text-xl" data-icon="solar:card-2-bold"></span></div>
<h3 class="text-lg font-bold text-gray-800">Pay &amp; Hours</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Hourly Rate (USD)</label>
<input class="form-input" type="number" value="25"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Weekly Hours</label>
<input class="form-input" type="number" value="10"/>
</div>
</div>
</section>
<div class="flex items-center justify-end space-x-4">
<a class="px-8 py-3 rounded-2xl font-bold text-red-400 hover:bg-red-50 transition-all" href="job-detail.html">Cancel Changes</a>
<a class="px-10 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-1 transition-all" href="my-job-list.html">Update Information</a>
</div>
</form>
</div>
</main>
</body>
</html>
