<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Post New Job - TA Recruitment MO System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FC; }
        .nav-link { display: flex; align-items: center; padding: 0.75rem; border-radius: 0.75rem; transition: all 0.3s ease; }
        .nav-link.active { background-color: rgb(239 246 255); color: rgb(37 99 235); font-weight: 600; }
        .nav-link.inactive { color: rgb(100 116 139); }
        .nav-link.inactive:hover { background-color: rgb(248 250 252); color: rgb(37 99 235); }
        .form-input { display: block; width: 100%; background-color: white; border: 1px solid rgb(229 231 235); border-radius: 1rem; padding: 0.75rem 1rem; transition: all 0.3s ease; outline: none; }
        .form-input:focus { border-color: rgb(59 130 246); box-shadow: 0 0 0 3px rgba(59 130 246, 0.1); }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex min-h-screen">
<!-- Sidebar -->
<aside class="w-64 bg-white border-r border-gray-100 flex flex-col fixed h-full z-50">
<div class="p-6 flex items-center space-x-3">
<div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
<span class="iconify text-2xl" data-icon="solar:library-bold"></span>
</div>
<span class="text-xl font-bold text-gray-800 tracking-tight">EduMO</span>
</div>
<nav class="flex-1 mt-4 px-4 space-y-2">
<a class="nav-link inactive" href="my-job-list.html">
<span class="iconify mr-3 text-xl" data-icon="solar:widget-4-bold"></span>
<span>Dashboard</span>
</a>
<a class="nav-link inactive" href="statistics-analysis.html">
<span class="iconify mr-3 text-xl" data-icon="solar:chart-2-bold"></span>
<span>Statistics</span>
</a>
<a class="nav-link inactive" href="notifications-messages.html">
<span class="iconify mr-3 text-xl" data-icon="solar:bell-bing-bold"></span>
<span>Notifications</span>
</a>
<a class="nav-link inactive" href="personal-center.html">
<span class="iconify mr-3 text-xl" data-icon="solar:user-circle-bold"></span>
<span>Profile Settings</span>
</a>
</nav>
</aside>
<!-- Main Content -->
<main class="ml-64 flex-1 flex flex-col">
<header class="h-16 bg-white/80 glass-effect border-b border-gray-100 flex items-center px-8">
<div class="flex items-center space-x-2 text-sm text-gray-500">
<a class="hover:text-blue-600" href="my-job-list.html">Jobs</a>
<span class="iconify" data-icon="solar:alt-arrow-right-linear"></span>
<span class="text-gray-900 font-medium">Create New Job</span>
</div>
</header>
<div class="p-8 max-w-4xl mx-auto w-full">
<div class="mb-10">
<h1 class="text-3xl font-black text-gray-800 mb-2">Create New TA Position</h1>
<p class="text-gray-400">Fill in the details below to start recruiting qualified student assistants.</p>
</div>
<form class="space-y-8 pb-20">
<!-- Section 1: Basic Info -->
<section class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
<div class="flex items-center mb-6 space-x-3">
<div class="p-2 bg-blue-50 text-blue-600 rounded-lg"><span class="iconify text-xl" data-icon="solar:info-square-bold"></span></div>
<h3 class="text-lg font-bold text-gray-800">Basic Information</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Course Name</label>
<input class="form-input" placeholder="e.g. Advanced Machine Learning" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Course Code</label>
<input class="form-input" placeholder="e.g. CS404" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Department</label>
<select class="form-input">
<option>Computer Science</option>
<option>Mathematics</option>
<option>Business School</option>
</select>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Deadline for Application</label>
<input class="form-input" type="date" value="2026-04-30"/>
</div>
</div>
</section>
<!-- Section 2: Requirements -->
<section class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
<div class="flex items-center mb-6 space-x-3">
<div class="p-2 bg-purple-50 text-purple-600 rounded-lg"><span class="iconify text-xl" data-icon="solar:diploma-bold"></span></div>
<h3 class="text-lg font-bold text-gray-800">Requirements &amp; Responsibilities</h3>
</div>
<div class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Minimum GPA Required</label>
<div class="flex items-center space-x-4">
<input class="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer" max="4.0" min="2.0" step="0.1" type="range" value="3.5"/>
<span class="text-blue-600 font-bold text-lg">3.5</span>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Key Responsibilities</label>
<textarea class="form-input" placeholder="List the main tasks..." rows="4"></textarea>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-gray-600 ml-1">Pre-requisite Courses</label>
<div class="flex flex-wrap gap-2">
<span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-medium text-gray-600 flex items-center">CS101 Intro <span class="ml-2 iconify cursor-pointer" data-icon="solar:close-circle-bold"></span></span>
<span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-medium text-white flex items-center">Add +</span>
</div>
</div>
</div>
</section>
<div class="flex items-center justify-end space-x-4">
<button class="px-8 py-3 rounded-2xl font-bold text-gray-400 hover:bg-gray-100 transition-all" type="button">Save as Draft</button>
<a class="px-10 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-1 transition-all" href="my-job-list.html">Publish Now</a>
</div>
</form>
</div>
</main>
</body>
</html>
