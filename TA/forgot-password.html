<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password - BUPT International School</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background: #F5F7FA; font-family: 'PingFang SC', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden border border-gray-100">
<!-- Decoration -->
<div class="h-2 bg-blue-600 w-full"></div>
<div class="p-8">
<div class="flex items-center gap-3 mb-8">
<a class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-500" href="index.html">
<span class="iconify text-xl" data-icon="mdi:arrow-left"></span>
</a>
<h2 class="text-xl font-bold text-gray-800">Reset your password</h2>
</div>
<!-- Steps -->
<div class="flex items-center justify-between mb-10 px-4">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold shadow-lg shadow-blue-200">1</div>
<span class="text-xs text-blue-600 font-medium">Verify</span>
</div>
<div class="flex-1 h-px bg-gray-200 mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center text-sm font-bold">2</div>
<span class="text-xs text-gray-400">Reset</span>
</div>
<div class="flex-1 h-px bg-gray-200 mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center text-sm font-bold text-lg">
<span class="iconify" data-icon="mdi:check"></span>
</div>
<span class="text-xs text-gray-400">Done</span>
</div>
</div>
<div class="space-y-6">
<div class="bg-blue-50 p-4 rounded-xl flex gap-3 items-start border border-blue-100">
<span class="iconify text-blue-500 mt-1 text-lg shrink-0" data-icon="mdi:information-outline"></span>
<p class="text-sm text-blue-700 leading-relaxed">Enter your student ID and registered email. We will send a reset link to your inbox.</p>
</div>
<div>
<label class="block text-sm font-semibold text-gray-700 mb-2">Student ID</label>
<input class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-gray-300" placeholder="e.g. 2026110123" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-gray-700 mb-2">Registered Email</label>
<input class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-gray-300" placeholder="example@bupt.edu.cn" type="email"/>
</div>
<button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2" type="button" onclick="alert('Verification email sent (mock). Please check your inbox.')">
                    Send verification email
                </button>
</div>
<div class="mt-8 text-center">
<p class="text-sm text-gray-400">Having trouble? Contact IT Service Center: <span class="text-blue-500 underline">010-6228xxxx</span></p>
</div>
</div>
</div>
</body>
</html>
